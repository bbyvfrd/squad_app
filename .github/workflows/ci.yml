name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; build-image widens this for GHCR.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Stage 1 — block any committed secret.
  secret-scan:
    runs-on: ubuntu-latest
    # gitleaks-action reads the PR's commits via the API on pull_request events.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit on push
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stage 2 — formatting, lint, and types. No app code is executed, so no env/DB needed.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prettier
        run: pnpm format:check
      - name: ESLint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Design rules
        run: pnpm check:design

  # Stage 3 — unit/contract + integration tests against a real Supabase-provisioned
  # Postgres. The migrations need Supabase's auth schema, roles, and auth.uid(), so CI
  # boots the local Supabase stack (same as dev) rather than a bare Postgres.
  test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: supabase/setup-cli@v2
        with:
          # Pinned, not "latest": resolving "latest" makes an unauthenticated
          # GitHub API call that gets rate-limited on shared runner IPs. A pinned
          # version downloads the release asset directly. Bump deliberately.
          version: 2.106.0
      - name: Start Supabase (provides auth schema, roles, auth.uid())
        run: supabase start
      - name: Apply migrations (proves migrations apply cleanly)
        run: pnpm exec drizzle-kit migrate
      - name: Unit + contract tests
        run: pnpm test
      - name: Integration tests
        run: pnpm test:integration

  # Stage 4a — SAST with Semgrep OSS (no account/token needed).
  sast:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - name: Semgrep scan
        run: semgrep scan --config auto --error

  # Stage 4b — dependency/secret scan (fs) + IaC/Dockerfile misconfig scan (config).
  vuln-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy filesystem scan (deps & secrets)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - name: Trivy config scan (IaC / Dockerfile)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

  # Stage 5 — build the portable image, scan it, publish to GHCR on main.
  build-image:
    needs: [secret-scan, lint, test, sast, vuln-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Compute lowercase image ref
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4
      - name: Build image (load into local daemon for scanning)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  # Stage 6 — Playwright E2E smoke against the app booted inside CI (Supabase-provisioned DB).
  # No NODE_ENV here: next build/start set it. The app reads DATABASE_URL from this job env,
  # so the health route reports db-up.
  e2e:
    needs: [secret-scan, lint, test, sast, vuln-scan]
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: supabase/setup-cli@v2
        with:
          # Pinned, not "latest": resolving "latest" makes an unauthenticated
          # GitHub API call that gets rate-limited on shared runner IPs. A pinned
          # version downloads the release asset directly. Bump deliberately.
          version: 2.106.0
      - name: Start Supabase
        run: supabase start
      - name: Apply migrations
        run: pnpm exec drizzle-kit migrate
      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Build app
        run: pnpm build
      - name: Run E2E smoke
        run: pnpm test:e2e
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Plan 3 — Terraform formatting + validation gate (offline; no cloud creds).
  tf-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.5"
      - name: terraform fmt
        run: terraform -chdir=infra/terraform fmt -check -recursive
      - name: Validate every module and env
        run: |
          set -e
          for dir in infra/terraform/modules/* infra/terraform/envs/*; do
            echo "== validating $dir =="
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate
          done

  # Plan 3 — app env-var schema must match the Terraform env contract (§7).
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check env-var parity
        run: node infra/terraform/scripts/check-env-parity.mjs
