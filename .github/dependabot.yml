version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      all-npm:
        patterns: ["*"]
        # Group only non-breaking updates; majors come as separate PRs so one
        # breaking major can't sink the whole batch (e.g. the ESLint 10 bump).
        update-types: ["minor", "patch"]
    ignore:
      # ESLint & TypeScript majors are gated by Next's eslint-config / tsc support
      # (ESLint 10 dropped the getFilename API that eslint-plugin-react still calls).
      # Adopt them deliberately with a Next.js upgrade, not an automated major bump.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      # Keep the base image on the chosen Node LTS line (24). Move to the next LTS
      # deliberately, not via an automated major bump (e.g. the 24 -> 26 jump).
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
