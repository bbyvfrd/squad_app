<!doctype html>
<!-- @dsCard group="Colors" name="Steel Ramp" subtitle="50–900, the dark structural family" viewport="700x190" -->
<html lang="en"><head>
<meta charset="utf-8">
<title>SQUAD · Card · Steel Ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--linen-200);font-family:var(--font-sans);color:var(--steel-700)}
  .card{padding:28px 32px;box-sizing:border-box;width:700px}
  .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
  .head h2{font-size:13px;font-family:var(--font-mono);font-weight:600;letter-spacing:0.22em;
    text-transform:uppercase;margin:0;color:var(--steel-700)}
  .head .sub{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--steel-400)}
  .ramp{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;height:80px}
  .swatch{border-radius:4px;display:flex;flex-direction:column;justify-content:flex-end;
    padding:8px;font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:0.1em}
  .swatch .stop{font-size:9px;opacity:0.7}
  .swatch .hex{font-size:8.5px}
  .anchor{outline:2px solid var(--terra-500);outline-offset:2px}
  .marks{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-top:6px;
    font-family:var(--font-mono);font-size:8px;letter-spacing:0.12em;
    text-transform:uppercase;color:var(--steel-400);text-align:center}
</style></head>
<body>
<div class="card">
  <div class="head">
    <h2>Steel · hue ~230°</h2>
    <span class="sub">Dark structural family · replaces black</span>
  </div>
  <div class="ramp">
    <div class="swatch" style="background:#F0F2F4;color:#13222C"><div class="stop">50</div><div class="hex">#F0F2F4</div></div>
    <div class="swatch" style="background:#D6DBE0;color:#13222C"><div class="stop">100</div><div class="hex">#D6DBE0</div></div>
    <div class="swatch" style="background:#BEC4CE;color:#13222C"><div class="stop">200</div><div class="hex">#BEC4CE</div></div>
    <div class="swatch" style="background:#8E96A1;color:#13222C"><div class="stop">300</div><div class="hex">#8E96A1</div></div>
    <div class="swatch" style="background:#6B7480;color:#EBE7DB"><div class="stop">400</div><div class="hex">#6B7480</div></div>
    <div class="swatch" style="background:#3A4550;color:#EBE7DB"><div class="stop">500</div><div class="hex">#3A4550</div></div>
    <div class="swatch" style="background:#1D3444;color:#EBE7DB"><div class="stop">600</div><div class="hex">#1D3444</div></div>
    <div class="swatch anchor" style="background:#13222C;color:#EBE7DB;position:relative"><div class="stop">700★</div><div class="hex">#13222C</div></div>
    <div class="swatch" style="background:#0C1820;color:#EBE7DB"><div class="stop">800</div><div class="hex">#0C1820</div></div>
    <div class="swatch" style="background:#060D14;color:#BEC4CE"><div class="stop">900</div><div class="hex">#060D14</div></div>
  </div>
  <div class="marks">
    <span></span><span></span><span>SLATE</span><span>DEEP·SL</span><span>ASH</span>
    <span>SMOKE</span><span>NAVY</span><span style="color:var(--terra-500);font-weight:700">JET ★</span>
    <span>PRESS</span><span></span>
  </div>
</div>
</body></html>
