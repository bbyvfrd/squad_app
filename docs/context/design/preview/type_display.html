<!doctype html>
<!-- @dsCard group="Type" name="Display Type" subtitle="Inter Tight 900 · The color spike rule" viewport="700x260" -->
<html lang="en"><head>
<meta charset="utf-8">
<title>SQUAD · Card · Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--linen-200);font-family:var(--font-sans);color:var(--steel-700)}
  .card{padding:32px;box-sizing:border-box;width:700px}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.22em;
    text-transform:uppercase;font-weight:600;color:var(--terra-500);margin-bottom:8px}
  .display{font-weight:900;font-size:120px;line-height:0.9;letter-spacing:-0.015em;
    text-transform:uppercase;margin:0;color:var(--steel-700)}
  .display .a{color:var(--terra-500)}
  .specs{margin-top:12px;display:flex;gap:18px;font-family:var(--font-mono);font-size:10px;
    letter-spacing:0.16em;text-transform:uppercase;font-weight:500;color:var(--steel-400)}
  .specs span b{color:var(--steel-700);font-weight:600}
</style></head>
<body>
<div class="card">
  <div class="meta">Display · Montserrat 900</div>
  <h1 class="display">SQUAD<br>UP <span class="a">NOW</span>.</h1>
  <div class="specs">
    <span><b>900</b> weight</span>
    <span><b>0.90</b> line</span>
    <span><b>−0.015em</b> track</span>
    <span><b>UPPERCASE</b></span>
    <span style="color:var(--terra-500);font-weight:600">ONE ACCENT WORD</span>
  </div>
</div>
</body></html>
