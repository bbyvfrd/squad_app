<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>SQUAD · Card · Skeleton</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--linen-300);font-family:var(--font-sans)}
  .frame{padding:30px;display:flex;gap:26px;align-items:flex-start}
  .col h2{font-family:var(--font-sans);font-size:10px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;color:var(--accent-text);margin:0 0 12px}
  .panel{width:330px;background:var(--bg-page);border-radius:20px;padding:16px;display:grid;gap:12px}
  /* a game-card skeleton built from .sq-card + .sq-skeleton */
  .sk-card{display:grid;gap:13px;padding:15px 16px}
  .sk-bar{display:flex;align-items:center;justify-content:space-between}
  .sk-top{display:flex;align-items:center;gap:13px}
  .sk-foot{display:flex;align-items:center;justify-content:space-between;padding-top:13px;border-top:1px solid var(--rule-hairline)}
  .sk-avs{display:flex}
  .sk-avs .sq-skeleton{margin-left:-8px;box-shadow:0 0 0 2.5px var(--bg-surface)}
  .sk-avs .sq-skeleton:first-child{margin-left:0}
</style></head>
<body>
<div class="frame">
  <div class="col">
    <h2>Skeleton · light</h2>
    <div class="panel">
      <!-- skeleton game card x2 -->
      <div class="sq-card sk-card">
        <div class="sk-bar"><div class="sq-skeleton sq-skeleton-line" style="width:96px;height:16px"></div><div class="sq-skeleton sq-skeleton-line" style="width:52px;height:16px"></div></div>
        <div class="sk-top"><div class="sq-skeleton" style="width:44px;height:44px;border-radius:12px"></div><div style="flex:1;display:grid;gap:7px"><div class="sq-skeleton sq-skeleton-line" style="width:60%;height:14px"></div><div class="sq-skeleton sq-skeleton-line" style="width:40%"></div></div></div>
        <div class="sq-skeleton sq-skeleton-line" style="width:100%;height:6px"></div>
        <div class="sk-foot">
          <div class="sk-avs"><span class="sq-skeleton sq-skeleton-circle" style="width:31px;height:31px"></span><span class="sq-skeleton sq-skeleton-circle" style="width:31px;height:31px"></span><span class="sq-skeleton sq-skeleton-circle" style="width:31px;height:31px"></span></div>
          <div class="sq-skeleton" style="width:82px;height:40px;border-radius:12px"></div>
        </div>
      </div>
      <div class="sq-card sk-card">
        <div class="sk-bar"><div class="sq-skeleton sq-skeleton-line" style="width:96px;height:16px"></div><div class="sq-skeleton sq-skeleton-line" style="width:52px;height:16px"></div></div>
        <div class="sk-top"><div class="sq-skeleton" style="width:44px;height:44px;border-radius:12px"></div><div style="flex:1;display:grid;gap:7px"><div class="sq-skeleton sq-skeleton-line" style="width:55%;height:14px"></div><div class="sq-skeleton sq-skeleton-line" style="width:35%"></div></div></div>
        <div class="sq-skeleton sq-skeleton-line" style="width:100%;height:6px"></div>
      </div>
    </div>
  </div>

  <div class="col" data-theme="dark">
    <h2>Skeleton · dark</h2>
    <div class="panel">
      <div class="sq-card sk-card">
        <div class="sk-bar"><div class="sq-skeleton sq-skeleton-line" style="width:96px;height:16px"></div><div class="sq-skeleton sq-skeleton-line" style="width:52px;height:16px"></div></div>
        <div class="sk-top"><div class="sq-skeleton" style="width:44px;height:44px;border-radius:12px"></div><div style="flex:1;display:grid;gap:7px"><div class="sq-skeleton sq-skeleton-line" style="width:60%;height:14px"></div><div class="sq-skeleton sq-skeleton-line" style="width:40%"></div></div></div>
        <div class="sq-skeleton sq-skeleton-line" style="width:100%;height:6px"></div>
        <div class="sk-foot">
          <div class="sk-avs"><span class="sq-skeleton sq-skeleton-circle" style="width:31px;height:31px"></span><span class="sq-skeleton sq-skeleton-circle" style="width:31px;height:31px"></span><span class="sq-skeleton sq-skeleton-circle" style="width:31px;height:31px"></span></div>
          <div class="sq-skeleton" style="width:82px;height:40px;border-radius:12px"></div>
        </div>
      </div>
      <div class="sq-card sk-card">
        <div class="sk-bar"><div class="sq-skeleton sq-skeleton-line" style="width:96px;height:16px"></div><div class="sq-skeleton sq-skeleton-line" style="width:52px;height:16px"></div></div>
        <div class="sk-top"><div class="sq-skeleton" style="width:44px;height:44px;border-radius:12px"></div><div style="flex:1;display:grid;gap:7px"><div class="sq-skeleton sq-skeleton-line" style="width:55%;height:14px"></div><div class="sq-skeleton sq-skeleton-line" style="width:35%"></div></div></div>
        <div class="sq-skeleton sq-skeleton-line" style="width:100%;height:6px"></div>
      </div>
    </div>
  </div>
</div>
</body></html>
