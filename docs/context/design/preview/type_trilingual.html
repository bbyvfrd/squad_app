<!doctype html>
<!-- @dsCard group="Type" name="Trilingual Specimens" subtitle="EN · RU · AZ verified at weight 900" viewport="700x280" -->
<html lang="en"><head>
<meta charset="utf-8">
<title>SQUAD · Card · Trilingual</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--linen-200);font-family:var(--font-sans);color:var(--steel-700)}
  .card{padding:32px;box-sizing:border-box;width:700px}
  .head{font-family:var(--font-mono);font-size:10px;letter-spacing:0.22em;
    text-transform:uppercase;font-weight:600;color:var(--terra-500);margin-bottom:14px}
  .row{display:grid;grid-template-columns:60px 1fr;align-items:baseline;gap:18px;
    padding:8px 0;border-bottom:1px solid var(--linen-300)}
  .row:last-child{border-bottom:none}
  .lang{font-family:var(--font-mono);font-size:11px;letter-spacing:0.22em;
    text-transform:uppercase;font-weight:700;color:var(--steel-700)}
  .glyphs{font-weight:900;font-size:50px;line-height:0.95;letter-spacing:-0.015em;text-transform:uppercase}
  .glyphs .a{color:var(--terra-500)}
</style></head>
<body>
<div class="card">
  <div class="head">Trilingual · EN / RU / AZ · weight 900</div>
  <div class="row"><div class="lang">EN</div><div class="glyphs">SQUAD UP <span class="a">NOW</span>.</div></div>
  <div class="row"><div class="lang">RU</div><div class="glyphs">СОБИРАЙ <span class="a">КОМАНДУ</span>.</div></div>
  <div class="row"><div class="lang">AZ</div><div class="glyphs">İndi <span class="a">SƏFƏRBƏR</span> ol.</div></div>
</div>
</body></html>
