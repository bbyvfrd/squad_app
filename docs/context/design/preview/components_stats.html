<!doctype html>
<!-- @dsCard group="Components" name="Stat Blocks" subtitle="Tabular nums · alternating terra/jet/bone" viewport="700x220" -->
<html lang="en"><head>
<meta charset="utf-8">
<title>SQUAD · Card · Stat Blocks</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--linen-200);font-family:var(--font-sans);color:var(--steel-700)}
  .frame{padding:28px 32px;box-sizing:border-box;width:700px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .stat{border-radius:6px;padding:24px 22px;display:flex;flex-direction:column;gap:18px;min-height:160px}
  .terra{background:var(--terra-500);color:var(--linen-200)}
  .jet{background:var(--steel-700);color:var(--linen-200)}
  .bone{background:var(--linen-100);color:var(--steel-700)}
  .num{font-weight:900;font-size:80px;line-height:0.82;letter-spacing:-0.04em;
    font-variant-numeric:tabular-nums;font-style:normal;margin:0}
  .terra .num .acc{color:var(--steel-700)}
  .jet .num .acc{color:var(--terra-500)}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;font-weight:500}
  .terra .lbl, .jet .lbl{color:rgba(235,231,219,0.8)}
  .bone .lbl{color:var(--steel-400)}
</style></head>
<body>
<div class="frame">
  <div class="stat terra"><h5 class="num">92<span class="acc">%</span></h5><div class="lbl">Win Rate</div></div>
  <div class="stat jet"><h5 class="num">14<span class="acc">s</span></h5><div class="lbl">Avg Break</div></div>
  <div class="stat bone"><h5 class="num">03</h5><div class="lbl">Trophies</div></div>
</div>
</body></html>
