<!doctype html>
<!-- @dsCard group="Colors" name="Terracotta Ramp" subtitle="50–900, the accent voice (hue ~35°)" viewport="700x190" -->
<html lang="en"><head>
<meta charset="utf-8">
<title>SQUAD · Card · Terracotta Ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--linen-200);font-family:var(--font-sans);color:var(--steel-700)}
  .card{padding:28px 32px;box-sizing:border-box;width:700px}
  .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
  .head h2{font-size:13px;font-family:var(--font-mono);font-weight:600;letter-spacing:0.22em;
    text-transform:uppercase;margin:0;color:var(--terra-500)}
  .head .sub{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--steel-400)}
  .ramp{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;height:80px}
  .swatch{border-radius:4px;display:flex;flex-direction:column;justify-content:flex-end;
    padding:8px;font-family:var(--font-mono);font-size:9px;font-weight:600;
    letter-spacing:0.1em;text-transform:uppercase}
  .swatch .stop{font-size:9px;opacity:0.7}
  .swatch .hex{font-size:8.5px}
  .anchor{outline:2px solid var(--steel-700);outline-offset:2px}
  .anchor::after{content:"★";position:absolute}
  .marks{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-top:6px;
    font-family:var(--font-mono);font-size:8px;letter-spacing:0.12em;
    text-transform:uppercase;color:var(--steel-400);text-align:center}
</style></head>
<body>
<div class="card">
  <div class="head">
    <h2>Terracotta · hue ~35°</h2>
    <span class="sub">The accent voice · spike, never wash</span>
  </div>
  <div class="ramp">
    <div class="swatch" style="background:#FDEDE6;color:#75210E"><div class="stop">50</div><div class="hex">#FDEDE6</div></div>
    <div class="swatch" style="background:#FBDDD2;color:#75210E"><div class="stop">100</div><div class="hex">#FBDDD2</div></div>
    <div class="swatch" style="background:#F8B79F;color:#4D1608"><div class="stop">200</div><div class="hex">#F8B79F</div></div>
    <div class="swatch" style="background:#F26B49;color:#4D1608"><div class="stop">300</div><div class="hex">#F26B49</div></div>
    <div class="swatch" style="background:#F05633;color:#EBE7DB"><div class="stop">400</div><div class="hex">#F05633</div></div>
    <div class="swatch anchor" style="background:#EE4721;color:#EBE7DB;position:relative"><div class="stop">500★</div><div class="hex">#EE4721</div></div>
    <div class="swatch" style="background:#C5371A;color:#EBE7DB"><div class="stop">600</div><div class="hex">#C5371A</div></div>
    <div class="swatch" style="background:#9D2C14;color:#EBE7DB"><div class="stop">700</div><div class="hex">#9D2C14</div></div>
    <div class="swatch" style="background:#75210E;color:#FBDDD2"><div class="stop">800</div><div class="hex">#75210E</div></div>
    <div class="swatch" style="background:#4D1608;color:#FBDDD2"><div class="stop">900</div><div class="hex">#4D1608</div></div>
  </div>
  <div class="marks">
    <span></span><span>WASH</span><span></span><span>HEAT</span><span></span>
    <span style="color:var(--terra-500);font-weight:700">FIRED ★</span>
    <span>DEEP</span><span></span><span></span><span></span>
  </div>
</div>
</body></html>
