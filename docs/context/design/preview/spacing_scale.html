<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing Scale" subtitle="8-grid · s1–s16" viewport="700x380" -->
<html lang="en"><head>
<meta charset="utf-8">
<title>SQUAD · Card · Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--linen-200);font-family:var(--font-sans);color:var(--steel-700)}
  .card{padding:28px 32px;box-sizing:border-box;width:700px}
  .head{font-family:var(--font-mono);font-size:10px;letter-spacing:0.22em;
    text-transform:uppercase;font-weight:600;color:var(--terra-500);margin-bottom:18px}
  .row{display:grid;grid-template-columns:50px 60px 1fr;align-items:center;gap:16px;
    padding:5px 0;font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--steel-500);font-weight:500}
  .tk{color:var(--steel-700);font-weight:600}
  .px{color:var(--steel-700);font-weight:700;text-align:right}
  .bar{height:14px;background:var(--terra-500);border-radius:2px}
</style></head>
<body>
<div class="card">
  <div class="head">Spacing · 8-Grid</div>
  <div class="row"><span class="tk">s1</span><span class="px">8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tk">s2</span><span class="px">16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tk">s3</span><span class="px">24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tk">s4</span><span class="px">32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tk">s5</span><span class="px">40</span><div class="bar" style="width:40px"></div></div>
  <div class="row"><span class="tk">s6</span><span class="px">48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tk">s7</span><span class="px">56</span><div class="bar" style="width:56px"></div></div>
  <div class="row"><span class="tk">s8</span><span class="px">64</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="tk">s10</span><span class="px">80</span><div class="bar" style="width:80px"></div></div>
  <div class="row"><span class="tk">s12</span><span class="px">96</span><div class="bar" style="width:96px"></div></div>
  <div class="row"><span class="tk">s14</span><span class="px">112</span><div class="bar" style="width:112px"></div></div>
  <div class="row"><span class="tk">s16</span><span class="px">128</span><div class="bar" style="width:128px"></div></div>
</div>
</body></html>
