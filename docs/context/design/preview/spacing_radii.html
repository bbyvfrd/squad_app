<!doctype html>
<!-- @dsCard group="Spacing" name="Corner Radii" subtitle="4 badges · 6 containers · 10 control clusters · 14 buttons & inputs" viewport="700x200" -->
<html lang="en"><head>
<meta charset="utf-8">
<title>SQUAD · Card · Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--linen-200);font-family:var(--font-sans);color:var(--steel-700);
    -webkit-font-smoothing:antialiased}
  .card{padding:30px 32px;box-sizing:border-box;width:700px}
  .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px}
  .head h2{margin:0;font-family:var(--font-sans);font-size:12px;letter-spacing:0.2em;
    text-transform:uppercase;font-weight:700;color:var(--terra-500)}
  .head .sub{font-family:var(--font-body);font-size:12px;color:var(--steel-400)}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;align-items:end}
  .item{display:flex;flex-direction:column;align-items:center;gap:9px}
  .box{width:100%;height:62px;background:var(--steel-700)}
  .box.star{background:var(--terra-500)}
  .px{font-family:var(--font-sans);font-size:13px;color:var(--steel-700);font-weight:800;letter-spacing:-0.01em}
  .tk{font-family:var(--font-sans);font-size:9px;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--steel-400);font-weight:600}
  .use{font-family:var(--font-sans);font-size:8.5px;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--terra-500);font-weight:600;text-align:center;line-height:1.4;min-height:22px}
  .use.muted{color:var(--steel-300)}
</style></head>
<body>
<div class="card">
  <div class="head"><h2>Corner Radii</h2><span class="sub">Crisp containers · soft controls</span></div>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="px">4</div><div class="tk">xs</div><div class="use">Badges<br>Checkbox</div></div>
    <div class="item"><div class="box star" style="border-radius:6px"></div><div class="px">6 ★</div><div class="tk">sm</div><div class="use">Cards · Surfaces<br>Stat blocks</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="px">10</div><div class="tk">md</div><div class="use">Segmented · Tabs<br>Stepper</div></div>
    <div class="item"><div class="box star" style="border-radius:14px"></div><div class="px">14 ★</div><div class="tk">lg</div><div class="use">Buttons<br>Inputs</div></div>
    <div class="item"><div class="box" style="border-radius:18px"></div><div class="px">18</div><div class="tk">xl</div><div class="use muted">Reserved</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="px">&infin;</div><div class="tk">pill</div><div class="use">Avatars<br>Toggle · Dot</div></div>
  </div>
</div>
</body></html>
