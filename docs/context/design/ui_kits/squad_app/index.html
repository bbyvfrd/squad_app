<!doctype html>
<!-- @dsCard group="UI Kit — Squad App" name="SQUAD App UI Kit" subtitle="Home + Games, built on canonical sq-* components" -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SQUAD — UI Kit · Home + Games</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="stylesheet" href="kit.css"/>
<style>
  html,body{ margin:0; height:100%; background:#cfcabf; transition:background .32s var(--ease-out); }
  html[data-theme="dark"] body{ background:#08090b; }
  /* theme toggle (chrome, sits outside the canvas) */
  .theme-toggle{
    position:fixed; top:18px; right:18px; z-index:9999; width:46px; height:46px; border-radius:14px;
    border:none; cursor:pointer; display:grid; place-items:center;
    background:var(--bg-surface); color:var(--fg-primary); box-shadow:inset 0 0 0 1px var(--rule-hairline), 0 6px 18px rgba(0,0,0,.18);
    transition:background .2s var(--ease-out), color .2s var(--ease-out);
  }
  .theme-toggle:hover{ background:var(--bg-elevated); }
  .theme-toggle .sq-icon{ font-size:24px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"><span class="sq-icon">dark_mode</span></button>

<script src="image-slot.js"></script>
<script type="text/babel" src="phone.jsx"></script>
<script type="text/babel" src="screens-home.jsx"></script>
<script type="text/babel" src="screens-games.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { HomeScreen, GamesScreen } = window;

const W = 440;
const FRAME = { background:'transparent', boxShadow:'none' };

function App(){
  return (
    <DesignCanvas>
      <DCSection id="app" title="SQUAD App"
        subtitle="The in-app surfaces, built entirely from the canonical .sq-* system — soft cards, the chunky terracotta button, Montserrat status badges, the capacity bar, avatar stacks, skill tags, sport-identity tints. Only the device chrome is kit-local.">
        <DCArtboard id="home"  label="01 · Home · Active feed" width={W} height={2420} style={FRAME}><HomeScreen/></DCArtboard>
        <DCArtboard id="games" label="02 · Games · Browse"     width={W} height={2240} style={FRAME}><GamesScreen/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// theme toggle
(function(){
  const root = document.documentElement;
  const btn = document.getElementById('theme-toggle');
  const ico = btn.querySelector('.sq-icon');
  function apply(t){ root.dataset.theme = t; ico.textContent = t==='dark' ? 'light_mode' : 'dark_mode'; localStorage.setItem('squad-theme', t); }
  apply(localStorage.getItem('squad-theme') || 'light');
  btn.addEventListener('click', ()=> apply(root.dataset.theme==='dark' ? 'light' : 'dark'));
})();

function sqReveal(){ document.querySelectorAll('.sqk-reveal').forEach(el=>el.classList.add('is-in')); }
requestAnimationFrame(()=>requestAnimationFrame(sqReveal));
setTimeout(sqReveal, 250);
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) sqReveal(); });
</script>
</body>
</html>
